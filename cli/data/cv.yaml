experience:
  - title: "Developpeur Python — Microservices & Automatisation"
    company: "Everping"
    location: "Remote"
    period: "2024 - 2026"
    context: "Dev solo — 25 personnes dans l'entreprise, 1 personne nocode en support"
    description: >
      Conception et developpement de 8 microservices et de multiples scripts
      d'automatisation pour transformer un flux logistique 100% manuel en
      processus entierement automatise.
    highlights:
      - >
        Automatisation de la mise a jour du catalogue produit : avant, la mise a
        jour se faisait manuellement sur Google Sheets en consultant chaque site
        fournisseur un par un (copier-coller ou telechargement de fichiers Excel),
        ~1,5 jour de travail. Script de scraping (API quand disponible, sinon
        telechargement de fichiers ou scraping pur), rassemblement, tri et insertion
        automatique en base de donnees sur scheduler journalier. Temps d'execution :
        10 minutes.
      - >
        Automatisation du traitement des commandes : notifications en temps reel
        a la reception, generation automatique de facture pro forma avec lien de
        paiement (CB via Stripe, virement via Fintecture selon le choix client),
        envoi automatique par email. Avant : tout etait fait manuellement sur
        chaque service.
      - >
        Automatisation de la logistique : creation automatique des etiquettes
        d'envoi UPS, suivi du flux complet avec notifications et logs dans Slack,
        generation automatique de la facture definitive au pickup UPS.
      - >
        Scripts internes : transfert de donnees entre HubSpot et Lemlist (pas
        possible nativement), recuperation automatique de factures fournisseurs et
        clients, calcul de marges.
    tags:
      - python
      - fastapi
      - microservices
      - automatisation
      - gcp
      - cloud-run
      - airtable
      - stripe
      - fintecture
      - ups-api
      - scraping
      - slack

