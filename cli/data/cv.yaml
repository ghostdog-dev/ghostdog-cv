experience:
  - title: "Développeur Python — Microservices & Automatisation"
    company: "Everping"
    location: "Remote"
    period: "2024 - 2026"
    context: "Dev solo — 25 personnes dans l'entreprise, 1 personne nocode en support"
    description: >
      Conception et développement de 8 microservices et de multiples scripts
      d'automatisation pour transformer un flux logistique 100% manuel en
      processus entièrement automatisé.
    highlights:
      - >
        Automatisation de la mise à jour du catalogue produit : avant, la mise à
        jour se faisait manuellement sur Google Sheets en consultant chaque site
        fournisseur un par un (copier-coller ou téléchargement de fichiers Excel),
        ~1,5 jour de travail. Script de scraping (API quand disponible, sinon
        téléchargement de fichiers ou scraping pur), rassemblement, tri et insertion
        automatique en base de données sur scheduler journalier. Temps d'exécution :
        10 minutes.
      - >
        Automatisation du traitement des commandes : notifications en temps réel
        à la réception, génération automatique de facture pro forma avec lien de
        paiement (CB via Stripe, virement via Fintecture selon le choix client),
        envoi automatique par email. Avant : tout était fait manuellement sur
        chaque service.
      - >
        Automatisation de la logistique : création automatique des étiquettes
        d'envoi UPS, suivi du flux complet avec notifications et logs dans Slack,
        génération automatique de la facture définitive au pickup UPS.
      - >
        Scripts internes : transfert de données entre HubSpot et Lemlist (pas
        possible nativement), récupération automatique de factures fournisseurs et
        clients, calcul de marges.
    tags:
      - python
      - fastapi
      - microservices
      - automatisation
      - gcp
      - cloud-run
      - airtable
      - stripe
      - fintecture
      - ups-api
      - scraping
      - slack

